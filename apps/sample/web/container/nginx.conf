server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long cache for hashed assets, no cache for the entry point.
  location ~* \.(js|css|svg|png|jpg|jpeg|gif|webp|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }

  # Don't echo nginx version in headers.
  server_tokens off;
}
