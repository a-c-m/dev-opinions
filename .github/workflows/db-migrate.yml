# Operator-triggered migration (Path B per ADR 0036).
# Use for risky / large / incident-investigation migrations — runs the
# migration *before* the deploy. The deploy's inline migrate step then
# no-ops (drizzle-kit migrate is idempotent; the advisory lock catches
# any concurrent triggers).
#
# Runbook: docs/runbooks/supervised-db-migrations.md
# See docs/adr/0036-safe-database-migrations.md for the Path A/B model.

name: db-migrate (supervised)

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'shared/db-<domain> package (e.g. shared/db-orders)'
        required: true
        type: string
      environment:
        description: 'Environment to migrate'
        required: true
        type: choice
        options: [stage, production]

permissions:
  id-token: write
  contents: read

jobs:
  migrate:
    uses: ./.github/workflows/_db-migrate.yml
    with:
      package: ${{ inputs.package }}
      environment: ${{ inputs.environment }}
    secrets: inherit
