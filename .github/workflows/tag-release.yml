# Tag a release: bump version + create vX.Y.Z tag per ADR 0035.
# Run AFTER QA on stage sign-off. Bump type auto-detected from
# Conventional Commits since last tag per ADR 0031.
# See docs/sops/release-pr-flow.md.

name: tag-release

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'NX project to release (or "all" for the whole workspace)'
        required: true
        type: string
        default: all

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-in-flight
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    # Human-approved environment gate per Priya F-9. Same reasoning as
    # cut-release.yml — tag creation is the deploy-prod input.
    environment: release-engineering
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: release-candidate
          persist-credentials: true   # job creates + pushes version tag

      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: nx release (bump + commit + tag + push)
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@noreply.invalid"
          if [ "${{ inputs.project }}" = "all" ]; then
            pnpm exec nx release --skip-publish
          else
            pnpm exec nx release --projects=${{ inputs.project }} --skip-publish
          fi
