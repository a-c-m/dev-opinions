name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: Lint / Typecheck / Test / Knip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # nx affected base needs full history
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup-monorepo

      - name: NX SHAs (for affected — used by test only)
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4

      # Lint + Typecheck run on the whole workspace, not `nx affected`.
      # See docs/conventions/nx-targets.md — tsgo + biome under nx affected
      # have triggered deadlocks locally; NX cache makes warm runs cheap
      # enough that the affected speedup isn't worth the risk.
      - name: Lint (run-many)
        run: pnpm exec nx run-many --target=lint --all

      - name: Typecheck (run-many)
        run: pnpm exec nx run-many --target=typecheck --all

      - name: Test with coverage (root vitest, generates coverage-summary.json)
        run: pnpm test:cov

      - name: Coverage ratchet (ADR 0014)
        run: pnpm cov:check

      - name: Dead code (full repo)
        run: pnpm knip

  lint-baseline:
    name: Lint baseline (bs check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup-monorepo

      - name: bs check with baseline enforcement
        run: pnpm lint:ci

  security:
    name: Security (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Trivy vulnerability + secret + misconfig scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: trivy-results.sarif
