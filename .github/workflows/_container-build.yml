# Reusable workflow: build, scan, and push a container image.
# Registry-agnostic — caller supplies registry, image, username, password.
# Example call (GHCR):
#
#   jobs:
#     build:
#       uses: ./.github/workflows/_container-build.yml
#       with:
#         image: ghcr.io/${{ github.repository }}/my-app
#         registry: ghcr.io
#         context: apps/my-app
#         dockerfile: apps/my-app/Dockerfile
#       secrets:
#         username: ${{ github.actor }}
#         password: ${{ secrets.GITHUB_TOKEN }}

name: _container-build (reusable)

on:
  workflow_call:
    inputs:
      registry:
        description: Registry hostname (ghcr.io, <account>.dkr.ecr.<region>.amazonaws.com, docker.io, ...)
        required: true
        type: string
      image:
        description: Full image name including registry and path (but without :tag).
        required: true
        type: string
      context:
        description: Docker build context directory.
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile (relative to checkout root).
        required: true
        type: string
      platforms:
        description: Comma-separated build platforms.
        required: false
        type: string
        default: linux/amd64
      push:
        description: Push after build. Set false for PR dry-runs.
        required: false
        type: boolean
        default: true
      severity-gate:
        description: Trivy severities that fail the build.
        required: false
        type: string
        default: HIGH,CRITICAL
    secrets:
      username:
        description: Registry username. For GHCR, use github.actor.
        required: true
      password:
        description: Registry password / token. For GHCR, use GITHUB_TOKEN.
        required: true
    outputs:
      image-digest:
        description: sha256 digest of the built image.
        value: ${{ jobs.build.outputs.digest }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ inputs.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=pr
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Setup QEMU
        if: contains(inputs.platforms, ',')
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Registry login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.username }}
          password: ${{ secrets.password }}

      - name: Build (and push if enabled)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          # When push is false (PR dry-run), load the image into the local
          # Docker daemon so the scan step below can reference it. buildx does
          # not load multi-platform builds, so PR dry-runs must build a single
          # platform.
          load: ${{ !inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          # Pushed image → scan by registry ref + digest (immutable).
          # Dry-run image → scan the local tag (digest unavailable without push).
          image-ref: ${{ inputs.push && format('{0}@{1}', inputs.image, steps.build.outputs.digest) || fromJson(steps.meta.outputs.json).tags[0] }}
          severity: ${{ inputs.severity-gate }}
          exit-code: "1"
          format: sarif
          output: trivy-image.sarif

      - name: Upload image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: trivy-image.sarif
          category: container-${{ inputs.image }}

      # SBOM only runs when the image was actually pushed. On PR dry-runs
      # (push=false), the digest exists only in the local buildx cache, not
      # in the registry, so `image-ref: <registry>/<image>@<digest>` would
      # fail to pull. Gating here prevents the always-fails-on-PR pattern
      # that trains the team to ignore SBOM failures (Priya F-4).
      - name: SBOM (CycloneDX)
        if: ${{ inputs.push }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: image
          image-ref: ${{ inputs.image }}@${{ steps.build.outputs.digest }}
          format: cyclonedx
          output: sbom.cdx.json

      - name: Upload SBOM artefact
        if: ${{ inputs.push }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 90
