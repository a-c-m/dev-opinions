# Reusable workflow: OpenTofu plan + apply for a per-app iac/ directory.
# Cloud-agnostic — caller wires its own provider credentials (AWS OIDC, GCP
# Workload Identity, Azure OIDC, etc.) as a step BEFORE calling this workflow.
#
# Example call (AWS via OIDC):
#
#   jobs:
#     deploy:
#       permissions:
#         id-token: write
#         contents: read
#       uses: ./.github/workflows/_infra-deploy.yml
#       with:
#         working-directory: apps/my-api/iac
#         var-file: .conf.prod.tfvars
#         environment: production
#       secrets:
#         encryption-passphrase: ${{ secrets.TF_ENCRYPTION }}
#         aws-role: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

name: _infra-deploy (reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        description: Path to the iac/ directory to apply.
        required: true
        type: string
      var-file:
        description: tfvars file name (relative to working-directory), e.g. .conf.prod.tfvars.
        required: true
        type: string
      environment:
        description: GitHub Environment name — gates secrets and required reviewers.
        required: true
        type: string
      tofu-version:
        description: OpenTofu CLI version.
        required: false
        type: string
        default: "1.8.5"
      auto-apply:
        description: Run apply automatically on main branch. Set false to require manual approval via environment reviewers.
        required: false
        type: boolean
        default: true
    secrets:
      encryption-passphrase:
        description: Passphrase for OpenTofu state encryption. Required.
        required: true
      aws-role:
        description: AWS IAM role ARN for OIDC assumption (optional; empty if not using AWS).
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  plan-apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      TF_ENCRYPTION: ${{ secrets.encryption-passphrase }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials via OIDC
        if: ${{ secrets.aws-role != '' }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.aws-role }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: ${{ inputs.tofu-version }}

      - name: tofu fmt
        run: tofu fmt -check -recursive

      - name: tofu init
        run: tofu init -input=false

      - name: tofu validate
        run: tofu validate

      - name: tofu plan
        run: |
          tofu plan \
            -input=false \
            -var-file="${{ inputs.var-file }}" \
            -out=tfplan.bin

      - name: tofu apply
        if: ${{ inputs.auto-apply }}
        run: tofu apply -input=false -auto-approve tfplan.bin

      - name: Upload plan artefact
        if: ${{ !inputs.auto-apply }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.sha }}
          path: ${{ inputs.working-directory }}/tfplan.bin
          retention-days: 14
