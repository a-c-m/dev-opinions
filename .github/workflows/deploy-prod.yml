# Deploy a tagged version to production per ADR 0035.
# - Validates the tag exists
# - Runs DB migrations (Path A inline call to _db-migrate.yml) BEFORE pods
# - Builds + promotes the runtime image from the tag SHA
# - Awaits the GitHub Environment approval gate (human approval)
# - On full success: merges the tag commit back to main
#
# A second human approves the `production` Environment step before
# rollout begins (Environment protection rules in GitHub Settings).

name: deploy-prod

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to deploy (e.g. v1.4.2)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  packages: write
# `contents: write` is scoped per-job — only `merge-back` needs it. Keeping
# it at the workflow level would grant the migrate / validate-tag / build
# jobs unnecessary write to the repo (least-privilege per Priya F-6).

concurrency:
  group: release-in-flight
  cancel-in-progress: false

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify tag exists
        run: git rev-parse "refs/tags/${{ inputs.tag }}" || exit 1

  migrate:
    needs: validate-tag
    uses: ./.github/workflows/_db-migrate.yml
    with:
      # Forks override `package` per their shared/db-* layout.
      package: shared/db-app
      environment: production
    # _db-migrate.yml declares no `workflow_call.secrets:` inputs — it uses
    # OIDC + vault-shim per ADR 0026. Don't widen the secret blast radius
    # with `inherit` (Priya F-5).

  build-and-deploy:
    needs: migrate
    runs-on: ubuntu-latest
    environment: production    # human approval gate per ADR 0035
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      # Per-fork: build container, push, roll out via Tofu / k8s / ECS.
      # Concrete steps land in the first fork that actually deploys.

  merge-back:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write   # only this job pushes to main (per Priya F-6)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: true   # job pushes to main; intent explicit
      - name: Merge tag → main
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@noreply.invalid"
          git fetch origin main:main
          git checkout main
          if ! git merge --no-ff -m "chore: merge-back ${{ inputs.tag }}" "${{ inputs.tag }}"; then
            echo "::warning::Merge-back conflict. Manual resolution required."
            git merge --abort
            exit 1
          fi
          git push origin main
