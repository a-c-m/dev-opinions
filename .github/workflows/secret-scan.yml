name: Secret scan

# Layer 2 of secret-scanning per ADR 0008. Gitleaks at pre-commit catches
# staged secrets locally; this workflow catches anything that slipped past
# (and history). `--only-verified` keeps the signal high — TruffleHog tests
# whether a matched credential still authenticates before failing, cutting
# false-positive triage substantially. See Priya's review for rationale.
#
# Two triggers:
#   - pull_request: scan the PR diff (fast, blocks merge on a verified hit).
#   - schedule (Mondays 06:30 UTC): full-history scan (catches anything that
#     made it past pre-commit + PR review).

on:
  pull_request:
  schedule:
    - cron: "30 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog-pr:
    name: TruffleHog (PR diff)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: TruffleHog (verified secrets on PR diff)
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          # The action already passes --fail; repeating it here makes newer
          # TruffleHog abort with "flag 'fail' cannot be repeated".
          extra_args: --only-verified

  trufflehog-history:
    name: TruffleHog (full history)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: TruffleHog (verified secrets, full history)
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          path: ./
          # The action already passes --fail (see PR-diff job above).
          extra_args: --only-verified
