name: Setup monorepo
description: Node via .nvmrc, pnpm via Corepack, cached install. **Caller must run `actions/checkout` first** — local composite actions can't be loaded before the repo is on disk.

# Caller responsibilities:
#
#   1. Run `actions/checkout` BEFORE invoking this composite. Local actions
#      live at `./.github/actions/...` and the runner can't read the
#      action.yml until the repo has been checked out.
#
#   2. Pass `fetch-depth: 0` on actions/checkout when the job needs git
#      history (nx affected base, biome baseline diff, nx release).
#
#   3. Pass `persist-credentials: false` UNLESS the job pushes to a
#      protected branch. Default-deny: stops any later step in the same
#      job (third-party action, malicious dep) reading the GH token from
#      .git/config. Jobs that need to push (cut-release, tag-release,
#      deploy-prod merge-back) opt in with `persist-credentials: true`.

inputs:
  install:
    description: Run `pnpm install --frozen-lockfile`. Set to `false` to skip for actions that only need the caches.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Read Node version from .nvmrc
      id: node-version
      shell: bash
      run: echo "version=$(cat .nvmrc | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ steps.node-version.outputs.version }}

    - name: Enable Corepack (pnpm)
      shell: bash
      run: corepack enable

    - name: Resolve pnpm store path
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-

    - name: Cache NX
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .nx/cache
        key: nx-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          nx-${{ runner.os }}-

    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
