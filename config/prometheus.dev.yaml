# Prometheus — local dev config per ADR 0032.
# OTLP receiver enabled so the Collector can remote-write metrics.
# Scrapes the Collector's self-metrics endpoint too.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
